<div>
  <div class="bg-surface rounded-2xl shadow-card border border-neutral-200 overflow-hidden mb-5">
    <div class="flex items-center gap-3 px-6 py-4 border-b border-neutral-100 bg-gradient-to-r from-accent-50 to-transparent">
      <div class="w-9 h-9 rounded-xl bg-accent-100 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
      </div>
      <div class="flex-1">
        <h3 class="text-sm font-bold text-primary-700">Actores Interesados</h3>
        <p class="text-xs text-neutral-500">Entidades, aliados y participantes del proyecto</p>
      </div>
    </div>

    <div class="divide-y divide-neutral-100">
      @for (row of rows(); track $index; let i = $index) {
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="w-6 h-6 rounded-full bg-accent flex items-center justify-center text-[10px] font-black text-white">{{ i + 1 }}</span>
              <span class="text-xs font-semibold text-neutral-600">Actor {{ i + 1 }}</span>
            </div>
            @if (rows().length > 1) {
              <button type="button" (click)="removeRow(i)" class="flex items-center gap-1 px-2 py-1 rounded-lg text-xs text-neutral-500 hover:text-danger hover:bg-danger/10 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Eliminar
              </button>
            }
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div>
              <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-wide mb-1.5">Nombre <span class="text-danger">*</span></label>
              <input type="text" [value]="row.name" (input)="update(i,'name',$any($event.target).value)"
                placeholder="Ej: Gobernación de Cundinamarca"
                class="w-full px-4 py-2.5 rounded-xl border border-neutral-200 text-sm text-primary-700 placeholder-neutral-400 bg-neutral-50 focus:bg-surface outline-none focus:ring-2 focus:ring-accent-200 focus:border-accent transition-colors"/>
            </div>

            <div>
              <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-wide mb-1.5">Tipo <span class="text-danger">*</span></label>
              <select [value]="row.type" (change)="update(i,'type',$any($event.target).value)"
                class="w-full px-4 py-2.5 rounded-xl border border-neutral-200 text-sm text-primary-700 bg-neutral-50 focus:bg-surface outline-none focus:ring-2 focus:ring-accent-200 focus:border-accent transition-colors appearance-none">
                @for (t of actorTypes; track t.value) {
                  <option [value]="t.value" [selected]="row.type === t.value">{{ t.label }}</option>
                }
              </select>
            </div>

            <div>
              <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-wide mb-1.5">Interés / Rol <span class="text-danger">*</span></label>
              <input type="text" [value]="row.interest" (input)="update(i,'interest',$any($event.target).value)"
                placeholder="Ej: Supervisión y validación técnica"
                class="w-full px-4 py-2.5 rounded-xl border border-neutral-200 text-sm text-primary-700 placeholder-neutral-400 bg-neutral-50 focus:bg-surface outline-none focus:ring-2 focus:ring-accent-200 focus:border-accent transition-colors"/>
            </div>

            <div>
              <label class="block text-[10px] font-bold text-neutral-500 uppercase tracking-wide mb-1.5">Recursos aportados <span class="text-danger">*</span></label>
              <input type="text" [value]="row.resources" (input)="update(i,'resources',$any($event.target).value)"
                placeholder="Ej: Financiamiento, personal técnico"
                class="w-full px-4 py-2.5 rounded-xl border border-neutral-200 text-sm text-primary-700 placeholder-neutral-400 bg-neutral-50 focus:bg-surface outline-none focus:ring-2 focus:ring-accent-200 focus:border-accent transition-colors"/>
            </div>

          </div>
        </div>
      }
    </div>

    <div class="px-6 py-4 border-t border-neutral-100 bg-neutral-50/50">
      <button type="button" (click)="addRow()" class="flex items-center gap-2 text-sm text-accent hover:text-accent-700 font-medium transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Agregar actor
      </button>
    </div>
  </div>

  <div class="flex items-center justify-between py-2">
    <button type="button" (click)="goBack.emit()" class="flex items-center gap-2 px-5 py-2.5 border border-neutral-200 text-neutral-600 text-sm font-semibold rounded-xl hover:bg-neutral-50 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Fase anterior
    </button>
    <button type="button" (click)="onSubmit()" [disabled]="submitting"
      class="flex items-center gap-2.5 px-6 py-3 bg-gradient-to-r from-accent to-accent-700 hover:from-accent-600 hover:to-accent-800 text-white text-sm font-bold rounded-xl shadow-md hover:shadow-lg transition-all disabled:opacity-60 disabled:cursor-not-allowed">
      @if (submitting) {
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        Guardando...
      } @else {
        Siguiente fase
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      }
    </button>
  </div>
</div>
