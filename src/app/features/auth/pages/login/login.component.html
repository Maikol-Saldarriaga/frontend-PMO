<!-- Login Page — PMO Platform -->
<div class="login-bg">

  <!-- Círculo decorativo verde (fondo) -->
  <div class="deco-green"></div>

  <!-- Card principal: dos columnas -->
  <div class="login-card">

    <!-- ── Columna izquierda: formulario ── -->
    <div class="form-col">

      <!-- Logo / marca -->
      <div class="flex flex-col items-center mb-8">
        <div class="logo-icon w-12 h-12 rounded-xl flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" style="color: #ffefb3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 17v-6a2 2 0 012-2h2a2 2 0 012 2v6m-6 0h6M3 17h18M5 17V9a2 2 0 012-2h10a2 2 0 012 2v8" />
          </svg>
        </div>
        <h1 class="text-xl font-semibold text-neutral-900 tracking-tight">Plataforma PMO FODC</h1>
        <p class="text-sm text-neutral-400 mt-1">Gestión estratégica de proyectos</p>
      </div>


      <!-- Título -->
      <div class="mb-6">
        <h2 class="text-2xl font-semibold text-neutral-900">Bienvenido</h2>
        <p class="text-sm text-neutral-500 mt-1">Inicia sesión para continuar</p>
      </div>

      <!-- Formulario -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <!-- Email -->
        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-neutral-700 mb-1.5">
            Correo electrónico
          </label>
          <input
            id="email" type="email" name="email" [(ngModel)]="email" required
            placeholder="tu@empresa.com"
            class="pmo-input w-full px-4 py-3 rounded-xl border border-neutral-300 bg-neutral-50 text-neutral-900 text-sm placeholder-neutral-400 transition-colors duration-200"
          />
        </div>

        <!-- Contraseña -->
        <div class="mb-7">
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-medium text-neutral-700">Contraseña</label>
            <a href="#" class="link-accent text-xs font-medium transition-colors">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <div class="relative">
            <input
              id="password" [type]="showPassword ? 'text' : 'password'" name="password"
              [(ngModel)]="password" required placeholder="••••••••"
              class="pmo-input w-full px-4 py-3 pr-11 rounded-xl border border-neutral-300 bg-neutral-50 text-neutral-900 text-sm placeholder-neutral-400 transition-colors duration-200"
            />
            <button
              type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600 transition-colors"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Ver contraseña'">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.33-3.793M6.5 6.5A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.398 2.602M6.5 6.5L17.5 17.5" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Mensaje de error -->
        <div *ngIf="errorMsg" class="flex items-center gap-2 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm mb-4">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
          {{ errorMsg }}
        </div>

        <!-- Submit -->
        <button
          type="submit" [disabled]="loading || !email || !password"
          class="btn-primary w-full py-3 rounded-xl font-semibold text-sm tracking-wide text-white">
          <span *ngIf="!loading">Iniciar sesión</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4z"/>
            </svg>
            Verificando...
          </span>
        </button>

      </form>

      <p class="text-center text-xs text-neutral-400 mt-8">
        © {{ currentYear }} Plataforma PMO · Todos los derechos reservados
      </p>
    </div>

    <!-- ── Columna derecha: imagen ── -->
    <div class="image-col">
      <img
        src="assets/login-imagen.webp"
        alt="Plataforma PMO - Gestión de proyectos"
        class="w-full h-full object-cover"
        onerror="this.style.display='none'"
      />
    </div>

  </div>
</div>
