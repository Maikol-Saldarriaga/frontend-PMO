<div class="space-y-5">

  <div>
    <h1 class="text-2xl font-extrabold text-primary-700">{{ title }}</h1>
    <p class="text-sm text-neutral-400 mt-0.5">{{ subtitle }}</p>
  </div>

  <div class="bg-surface rounded-2xl border-2 border-dashed border-neutral-100 p-16 text-center">
    <div class="w-16 h-16 rounded-2xl bg-accent-50 border border-accent-100 flex items-center justify-center mx-auto mb-5">
      <ng-container [ngSwitch]="icon">
        <svg *ngSwitchCase="'users'" class="w-8 h-8 text-accent-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <svg *ngSwitchCase="'chart'" class="w-8 h-8 text-accent-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </ng-container>
    </div>
    <h3 class="text-lg font-semibold text-primary-700">Próximamente</h3>
    <p class="text-sm text-neutral-400 mt-2 max-w-md mx-auto">{{ description }}</p>
  </div>

</div>
