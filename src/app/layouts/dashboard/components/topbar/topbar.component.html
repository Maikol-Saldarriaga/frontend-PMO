<header class="topbar">

  <!-- Lado izquierdo -->
  <div class="topbar__left">
    <button class="topbar__menu-btn" (click)="toggleSidebar.emit()" aria-label="Menú">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <h2 class="topbar__title">{{ pageTitle }}</h2>
  </div>

  <!-- Lado derecho -->
  <div class="topbar__right">

    <!-- Notificaciones — Flowbite Dropdown -->
    <div class="relative">
      <button
        id="notif-btn"
        data-dropdown-toggle="notif-dropdown"
        data-dropdown-placement="bottom-end"
        class="topbar__icon-btn"
        type="button"
        aria-label="Notificaciones">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <span class="topbar__badge" *ngIf="notifications > 0">{{ notifications }}</span>
      </button>

      <!-- Dropdown notificaciones -->
      <div id="notif-dropdown"
           class="z-50 hidden w-80 bg-white divide-y divide-neutral-100 rounded-xl shadow-lg border border-neutral-200">
        <div class="px-4 py-3 flex items-center justify-between">
          <span class="text-sm font-semibold text-primary-800">Notificaciones</span>
          <span class="notif-count">{{ notifications }} nuevas</span>
        </div>
        <ul class="divide-y divide-neutral-100 max-h-64 overflow-y-auto">
          <li class="notif-item">
            <div class="notif-dot notif-dot--accent"></div>
            <div>
              <p class="notif-item__text">Proyecto <b>ERP Corporativo</b> alcanzó 68% de avance</p>
              <p class="notif-item__time">Hace 10 min</p>
            </div>
          </li>
          <li class="notif-item">
            <div class="notif-dot notif-dot--warning"></div>
            <div>
              <p class="notif-item__text">Tarea <b>Revisión de requerimientos</b> vence hoy</p>
              <p class="notif-item__time">Hace 1 hora</p>
            </div>
          </li>
          <li class="notif-item">
            <div class="notif-dot notif-dot--primary"></div>
            <div>
              <p class="notif-item__text"><b>María López</b> te asignó una nueva tarea</p>
              <p class="notif-item__time">Hace 3 horas</p>
            </div>
          </li>
        </ul>
        <div class="px-4 py-2.5">
          <button type="button" class="text-xs font-medium text-primary-700 hover:underline">Ver todas las notificaciones</button>
        </div>
      </div>
    </div>

    <div class="topbar__divider"></div>

    <!-- Avatar + Dropdown usuario — Flowbite -->
    <div class="relative">
      <button
        id="user-btn"
        data-dropdown-toggle="user-dropdown"
        data-dropdown-placement="bottom-end"
        class="topbar__user"
        type="button">

        <!-- Avatar: imagen base64 o iniciales -->
        <div class="topbar__avatar">
          <img *ngIf="avatarUrl" [src]="avatarUrl" alt="avatar" class="w-full h-full object-cover rounded-full"/>
          <span *ngIf="!avatarUrl">{{ initials }}</span>
        </div>

        <div class="topbar__user-info">
          <span class="topbar__user-name">{{ user?.name }}</span>
          <span class="topbar__user-role">{{ user?.role }}</span>
        </div>
        <svg class="w-4 h-4 ml-1 text-neutral-400 hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- Dropdown usuario -->
      <div id="user-dropdown"
           class="z-50 hidden w-52 bg-white divide-y divide-neutral-100 rounded-xl shadow-lg border border-neutral-200">
        <div class="px-4 py-3">
          <p class="text-sm font-semibold text-neutral-900">{{ user?.name }}</p>
          <p class="text-xs text-neutral-500 truncate">{{ user?.email }}</p>
        </div>
        <ul class="py-1">
          <li><button type="button" class="user-menu-item w-full text-left" (click)="goToProfile()">Mi perfil</button></li>
          <li><button type="button" class="user-menu-item w-full text-left">Configuración</button></li>
        </ul>
        <div class="py-1">
          <button (click)="logout()" class="user-menu-item user-menu-item--danger w-full text-left">
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>

  </div>
</header>
